# cadence — prebuilt-image compose file.
#
# Usage:
#   1. Copy this file to docker-compose.yml
#   2. Copy .env.example to .env and fill in the required values
#   3. docker compose up -d
#
# Update: docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cadence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadence}
      POSTGRES_DB: ${POSTGRES_DB:-cadence}
    # The app container reaches Postgres over the internal Docker network,
    # so you don't need to publish 5432 on the host. Uncomment only if you
    # want to connect from the host (e.g. with `psql` or a GUI client).
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - cadence_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadence}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    # Tracks the latest build from `main`. For a stable pin, use `:1` (floats
    # within the v1 major, safe for `docker compose pull` auto-upgrades) or
    # `:1.0.0` for an exact version pin.
    # Alternatives: docker.io/walrusquant/cadence:latest
    image: ghcr.io/walrusquant/cadence:latest
    container_name: cadence-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cadence}:${POSTGRES_PASSWORD:-cadence}@postgres:5432/${POSTGRES_DB:-cadence}
      SELF_HOSTED_USER_ID: ${SELF_HOSTED_USER_ID}
      SELF_HOSTED_USER_EMAIL: ${SELF_HOSTED_USER_EMAIL:-user@localhost}
      MCP_API_KEY: ${MCP_API_KEY}
      # Your timezone (e.g. America/New_York). Controls when "today" rolls over
      # for tasks, habits, journal, and briefings. Defaults to UTC.
      TZ: ${TZ:-UTC}
    ports:
      # Localhost by default. If you're fronting this with Tailscale or a reverse
      # proxy, replace "127.0.0.1" with your Tailscale IP (e.g. "100.x.y.z:3000:3000").
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/mcp/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Entrypoint waits for Postgres and runs migrations before the server starts
      start_period: 30s

  db-backup:
    # Daily pg_dump with retention. Dumps land in ./backups next to this file
    # so you can `ls` them and rsync offsite. Disable by commenting out the
    # whole service — the rest of the stack is unaffected.
    image: prodrigestivill/postgres-backup-local:16
    container_name: cadence-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-cadence}
      POSTGRES_USER: ${POSTGRES_USER:-cadence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadence}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups

volumes:
  cadence_pgdata:
